<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REAL WORKOUT 元住吉店 — 管理画面</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --black:   #0a0a0a;
    --dark2:   #1a1a1a;
    --dark3:   #222222;
    --border:  #2e2e2e;
    --border2: #3a3a3a;
    --muted:   #aaaaaa;
    --body:    #e8e4de;
    --bright:  #f5f2ee;
    --accent:  #c8a96e;
    --accent2: #a88a52;
    --green:   #5ec98a;
    --red:     #e05444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--black); color: var(--body); font-family: 'Noto Sans JP', sans-serif; min-height: 100vh; }

  .site-header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 24px;
    background: rgba(10,10,10,0.97);
    border-bottom: 1px solid var(--border);
  }
  .site-name-main { font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 700; letter-spacing: 0.18em; color: var(--bright); text-transform: uppercase; }
  .site-name-sub { font-size: 10px; letter-spacing: 0.12em; color: var(--muted); margin-top: 2px; }
  .header-badge { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.15em; color: var(--black); background: var(--red); padding: 4px 10px; border-radius: 2px; text-transform: uppercase; }

  .main { padding: 88px 24px 48px; max-width: 800px; margin: 0 auto; }

  .page-title { font-family: 'Barlow Condensed', sans-serif; font-size: 28px; font-weight: 700; letter-spacing: 0.06em; color: var(--bright); text-transform: uppercase; margin-bottom: 6px; }
  .page-sub { font-size: 12px; color: var(--muted); letter-spacing: 0.08em; margin-bottom: 28px; }

  /* DATE NAV */
  .date-nav { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
  .nav-btn { background: var(--dark2); border: 1px solid var(--border2); border-radius: 4px; color: var(--body); width: 40px; height: 40px; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; transition: border-color 0.2s; flex-shrink: 0; }
  .nav-btn:hover { border-color: var(--accent); color: var(--bright); }
  .date-nav-label { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 600; color: var(--bright); letter-spacing: 0.08em; flex: 1; }
  .refresh-btn { background: none; border: 1px solid var(--border2); border-radius: 4px; color: var(--muted); font-size: 12px; font-family: 'Barlow Condensed', sans-serif; letter-spacing: 0.12em; text-transform: uppercase; padding: 8px 14px; cursor: pointer; transition: all 0.2s; }
  .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* LOADING / ERROR */
  .loading-state { display: flex; align-items: center; gap: 12px; padding: 32px 0; color: var(--muted); font-size: 13px; }
  .spinner { width: 20px; height: 20px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-state { background: rgba(224,84,68,0.1); border: 1px solid rgba(224,84,68,0.35); border-radius: 4px; padding: 14px 18px; font-size: 13px; color: #f09080; }
  .empty-state { text-align: center; padding: 48px 0; color: var(--muted); font-size: 13px; letter-spacing: 0.05em; }

  /* BOOKING CARD */
  .booking-card {
    background: var(--dark2); border: 1px solid var(--border2); border-radius: 6px;
    padding: 18px 20px; margin-bottom: 12px;
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
  }
  .booking-card.cancelled { opacity: 0.4; pointer-events: none; }
  .booking-info { flex: 1; }
  .booking-time { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 700; color: var(--bright); letter-spacing: 0.06em; }
  .booking-name { font-size: 14px; font-weight: 500; color: var(--bright); margin-top: 4px; }
  .booking-meta { font-size: 12px; color: var(--muted); margin-top: 3px; letter-spacing: 0.04em; }
  .booking-date-label { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.2em; color: var(--accent); text-transform: uppercase; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }

  .cancel-btn {
    background: transparent; border: 1px solid var(--red); color: var(--red);
    border-radius: 4px; padding: 8px 16px;
    font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700;
    letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer;
    transition: background 0.2s, color 0.2s; flex-shrink: 0;
  }
  .cancel-btn:hover { background: var(--red); color: white; }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: center; justify-content: center; padding: 24px; }
  .modal-overlay.active { display: flex; }
  .modal { background: var(--dark2); border: 1px solid var(--border2); border-radius: 8px; padding: 28px 24px; max-width: 400px; width: 100%; }
  .modal-title { font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 700; color: var(--bright); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 12px; }
  .modal-body { font-size: 13px; color: var(--body); line-height: 1.9; margin-bottom: 24px; }
  .modal-body strong { color: var(--bright); }
  .modal-btns { display: flex; gap: 10px; }
  .modal-btn-cancel { flex: 1; background: transparent; border: 1px solid var(--border2); color: var(--muted); border-radius: 4px; padding: 12px; font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; transition: border-color 0.2s; }
  .modal-btn-cancel:hover { border-color: var(--body); color: var(--body); }
  .modal-btn-confirm { flex: 1; background: var(--red); border: none; color: white; border-radius: 4px; padding: 12px; font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; transition: opacity 0.2s; }
  .modal-btn-confirm:hover { opacity: 0.85; }
  .modal-btn-confirm:disabled { opacity: 0.4; cursor: default; }

  .day-group { margin-bottom: 28px; }
</style>
</head>
<body>

<header class="site-header">
  <div>
    <div class="site-name-main">Real Workout</div>
    <div class="site-name-sub">元住吉店</div>
  </div>
  <div class="header-badge">Admin</div>
</header>

<main class="main">
  <div class="page-title">予約管理</div>
  <div class="page-sub">予約の確認・キャンセルができます</div>

  <div class="date-nav">
    <button class="nav-btn" id="prevBtn" onclick="navigate(-1)">‹</button>
    <div class="date-nav-label" id="navLabel">—</div>
    <button class="nav-btn" onclick="navigate(1)">›</button>
    <button class="refresh-btn" onclick="loadBookings()">更新</button>
  </div>

  <div id="bookingList">
    <div class="loading-state"><div class="spinner"></div>予約を読み込み中...</div>
  </div>
</main>

<!-- キャンセル確認モーダル -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title">予約キャンセル</div>
    <div class="modal-body" id="modalBody">—</div>
    <div class="modal-btns">
      <button class="modal-btn-cancel" onclick="closeModal()">戻る</button>
      <button class="modal-btn-confirm" id="modalConfirmBtn" onclick="confirmCancel()">キャンセルする</button>
    </div>
  </div>
</div>

<script>
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbzPym544KM3igumGKfvavM5j-YMY78jfUexaa8756DJz9CtFfROH_tVwk6d7zowcD2vfA/exec';

  const DAY_JP = ['日','月','火','水','木','金','土'];
  let offset = 0; // 週のオフセット
  let pendingCancel = null;

  function getWeekRange() {
    const today = new Date();
    today.setHours(0,0,0,0);
    const start = new Date(today);
    start.setDate(start.getDate() + offset * 7);
    // 月曜始まりに調整
    const dow = start.getDay();
    start.setDate(start.getDate() - (dow === 0 ? 6 : dow - 1));
    const end = new Date(start);
    end.setDate(end.getDate() + 6);
    return { start, end };
  }

  function fmt(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function updateLabel() {
    const { start, end } = getWeekRange();
    document.getElementById('navLabel').textContent =
      `${start.getMonth()+1}/${start.getDate()} — ${end.getMonth()+1}/${end.getDate()}`;
    document.getElementById('prevBtn').disabled = offset <= 0;
  }

  function navigate(dir) {
    offset += dir;
    if (offset < 0) offset = 0;
    updateLabel();
    loadBookings();
  }

  function loadBookings() {
    const { start, end } = getWeekRange();
    const list = document.getElementById('bookingList');
    list.innerHTML = '<div class="loading-state"><div class="spinner"></div>予約を読み込み中...</div>';

    const callbackName = 'adminCallback_' + Date.now();
    const script = document.createElement('script');
    const timeoutId = setTimeout(() => {
      delete window[callbackName]; script.remove();
      list.innerHTML = '<div class="error-state">読み込みに失敗しました。更新ボタンを押してください。</div>';
    }, 10000);

    window[callbackName] = function(data) {
      clearTimeout(timeoutId); delete window[callbackName]; script.remove();
      renderBookings(data.slots || []);
    };

    script.src = GAS_URL + '?start=' + fmt(start) + '&end=' + fmt(end) + '&callback=' + callbackName;
    document.head.appendChild(script);
  }

  function renderBookings(slots) {
    const list = document.getElementById('bookingList');
    const { start } = getWeekRange();

    // 予約済みのスロットのみ（available=falseかつカレンダーイベントあり）
    // doGetからbookedSlotsを返してもらう必要があるため、ここではslotsを使う
    // 空きでないスロット = 予約済み
    const booked = slots.filter(s => !s.available);

    if (!booked.length) {
      list.innerHTML = '<div class="empty-state">この週の予約はありません。</div>';
      return;
    }

    // 日付ごとにグループ化
    const byDate = {};
    booked.forEach(s => {
      if (!byDate[s.date]) byDate[s.date] = [];
      byDate[s.date].push(s);
    });

    list.innerHTML = '';
    Object.keys(byDate).sort().forEach(date => {
      const d = new Date(date + 'T00:00:00');
      const group = document.createElement('div');
      group.className = 'day-group';
      group.innerHTML = `<div class="booking-date-label">${d.getMonth()+1}月${d.getDate()}日（${DAY_JP[d.getDay()]}）</div>`;

      byDate[date].forEach(slot => {
        const card = document.createElement('div');
        card.className = 'booking-card';
        card.innerHTML = `
          <div class="booking-info">
            <div class="booking-time">${slot.time}</div>
            <div class="booking-name">${slot.name || '予約済み'}</div>
            <div class="booking-meta">${slot.phone || ''} ${slot.email ? '/ ' + slot.email : ''}</div>
          </div>
          <button class="cancel-btn" onclick="openModal('${date}', '${slot.time}', '${(slot.name||'').replace(/'/g, "\\'")}', '${(slot.email||'').replace(/'/g, "\\'")}')">キャンセル</button>
        `;
        group.appendChild(card);
      });

      list.appendChild(group);
    });
  }

  function openModal(date, time, name, email) {
    pendingCancel = { date, time, name, email };
    const d = new Date(date + 'T00:00:00');
    document.getElementById('modalBody').innerHTML =
      `以下の予約をキャンセルしますか？<br><br>` +
      `<strong>${d.getMonth()+1}月${d.getDate()}日（${DAY_JP[d.getDay()]}）${time}</strong><br>` +
      `お名前：<strong>${name || '不明'}</strong><br><br>` +
      `キャンセル通知メールをお客様${email ? 'とスタッフ' : 'に'}送信します。`;
    document.getElementById('modalOverlay').classList.add('active');
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('active');
    pendingCancel = null;
  }

  function confirmCancel() {
    if (!pendingCancel) return;
    const btn = document.getElementById('modalConfirmBtn');
    btn.disabled = true;
    btn.textContent = '処理中...';

    const callbackName = 'cancelCallback_' + Date.now();
    const script = document.createElement('script');
    const timeoutId = setTimeout(() => {
      delete window[callbackName]; script.remove();
      btn.disabled = false; btn.textContent = 'キャンセルする';
      alert('エラーが発生しました。もう一度お試しください。');
    }, 10000);

    window[callbackName] = function(data) {
      clearTimeout(timeoutId); delete window[callbackName]; script.remove();
      closeModal();
      btn.disabled = false; btn.textContent = 'キャンセルする';
      loadBookings();
    };

    const params = new URLSearchParams({
      action: 'cancel',
      date: pendingCancel.date,
      time: pendingCancel.time,
      name: pendingCancel.name || '',
      email: pendingCancel.email || '',
      callback: callbackName
    });
    script.src = GAS_URL + '?' + params.toString();
    document.head.appendChild(script);
  }

  // 初期化
  updateLabel();
  loadBookings();
</script>
</body>
</html>
